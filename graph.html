<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="icon"
            type="image/png"
            href="src/imgs/graph_window_icon.svg"
        />
        <link rel="stylesheet" href="src/style.css" />
        <style>
            body {
                overflow: hidden;
            }
        </style>

        <script type="module" src="src/graph.ts"></script>
        <title>Dependency Graph</title>
    </head>
    <body>
        <div id="graph"></div>

        <div>
            <p
                id="node-count"
                style="position: fixed; bottom: 0px; right: 10px"
            ></p>
        </div>
        <div id="notifications"></div>

        <div id="legend-container">
            <img
                id="node-legend-img"
                src="src/imgs/node_legend.svg"
                alt="Node Legend"
                style="
                    position: absolute;
                    width: 225px;
                    top: 5px;
                    transition: left 0.5s ease;
                    visibility: hidden;
                "
            />
            <button id="node-legend-arrow">
                <img
                    src="src/imgs/node_legend_arrow.svg"
                    id="node-legend-arrow-img"
                    style="
                        position: absolute;
                        width: 40px;
                        top: 15px;
                        transition: left 0.5s ease;
                        visibility: hidden;
                    "
                />
            </button>
        </div>

        <div>
            <button id="search-motor-btn">
                <img
                    id="curseforge-btn-img"
                    style="
                        position: fixed;
                        bottom: 0px;
                        left: 5px;
                        width: 5vw;
                        visibility: hidden;
                    "
                    src="src/imgs/curseforge_indicator.svg"
                    alt="Search Engine Indicator"
                />
                <img
                    id="modrinth-btn-img"
                    style="
                        position: fixed;
                        bottom: 0px;
                        left: 5px;
                        width: 5vw;
                        visibility: hidden;
                    "
                    src="src/imgs/modrinth_indicator.svg"
                    alt="Search Engine Indicator"
                />
            </button>
        </div>
    </body>
</html>
