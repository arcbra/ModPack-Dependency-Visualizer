<!doctype html>
<html lang="en">
    <head>
        <link
            rel="icon"
            type="image/png"
            href="/ModPack-Dependency-Visualizer/assets/index_window_icon-DUn6KimZ.svg"
        />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Modpack Dependency Visualizer</title>
      <script type="module" crossorigin src="/ModPack-Dependency-Visualizer/assets/main-CQGkWugJ.js"></script>
      <link rel="modulepreload" crossorigin href="/ModPack-Dependency-Visualizer/assets/notifications-BfNktnXX.js">
      <link rel="stylesheet" crossorigin href="/ModPack-Dependency-Visualizer/assets/notifications-jmrNHFJK.css">
    </head>

    <body>
        <a
            href="https://github.com/arcbra/ModPack-Dependency-Visualizer"
            ,
            target="_blank"
        >
            <img
                src="/ModPack-Dependency-Visualizer/assets/github_icon-DRaF6SNJ.svg"
                alt="Github"
                style="position: fixed; top: 20px; right: 20px; width: 50px"
            />
        </a>

        <div class="container">
            <div id="notifications"></div>
            <h1>Modpack Dependency Visualizer</h1>

            <label id="drop-zone">
                Drop your JAR files or your JSON here.
                <br>
                Or click to upload.
                <input type="file" id="file-input" multiple accept=".jar,.json" />
            </label>
            <ul id="file-list"></ul>

            <div class="button-row" style="align-items: center">
                <button id="submit-btn">Submit</button>
                <button id="clear-btn">Clear</button>
            </div>

            <div id="progress-bar"></div>

            <p
                id="file-counter"
                style="
                    position: fixed;
                    bottom: 2vh;
                    right: 100px;
                    width: 15vw;
                    min-width: fit-content;
                "
            ></p>
        </div>

        <a href="https://buymeacoffee.com/arcbaedlb" target="_blank">
            <img
                src="/ModPack-Dependency-Visualizer/assets/buymeacoffe-D74zIxOa.svg"
                alt="Buy me a coffe!"
                style="position: fixed; width: 50px; bottom: 2vh; right: 20px"
            />
        </a>
    </body>
</html>
