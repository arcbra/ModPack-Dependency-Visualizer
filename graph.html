<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="icon"
            type="image/png"
            href="src/imgs/graph_window_icon.svg"
        />
        <link rel="stylesheet" href="src/style.css" />
        <style>
            body {
                overflow: hidden;
            }
        </style>

        <script type="module" src="src/graph.ts"></script>
        <title>Dependency Graph</title>
    </head>
    <body>
        <div id="graph"></div>

        <div>
            <p
                id="node-count"
                style="position: fixed; bottom: 15px; right: 40px"
            ></p>
            <button
                id="download-btn"
                style="position: fixed; bottom: 15px; right: 0px; background: none; border: none; cursor: pointer"
            >
                <img
                    src="src/imgs/download.svg"
                    alt="Download Graph"
                    style="width: 20px"
                />
            </button>
        </div>

        <div id="legend-container">
            <img
                id="node-legend-img"
                src="src/imgs/node_legend.svg"
                alt="Node Legend"
                style="
                    position: absolute;
                    width: 225px;
                    top: 5px;
                    transition: left 0.3s ease;
                    visibility: hidden;
                "
            />
            <button id="node-legend-arrow">
                <img
                    src="src/imgs/node_legend_arrow.svg"
                    id="node-legend-arrow-img"
                    style="
                        position: absolute;
                        width: 40px;
                        top: 15px;
                        transition: left 0.3s ease;
                        visibility: hidden;
                    "
                />
            </button>
        </div>

        <div>
            <button id="search-motor-btn">
                <img
                    id="curseforge-btn-img"
                    src="src/imgs/curseforge_indicator.svg"
                    alt="Search Engine Indicator"
                    style="
                        position: fixed;
                        bottom: 0px;
                        left: 5px;
                        width: 60px;
                        transition: left 0.5s ease;
                        visibility: hidden;
                    "
                />
                <img
                    id="modrinth-btn-img"
                    src="src/imgs/modrinth_indicator.svg"
                    alt="Search Engine Indicator"
                    style="
                        position: fixed;
                        bottom: 0px;
                        left: 5px;
                        width: 60px;
                        transition: left 0.5s ease;
                        visibility: hidden;
                    "
                />
            </button>
        </div>

        <div>
            <button id="edit-mode-btn">
                <img
                    src="src/imgs/view_mode.svg"
                    id="view-mode-img"
                    alt="View Mode"
                    style="
                        position: fixed;
                        top: 5px;
                        right: 10px;
                        width: 60px;
                        transition: right 0.5s ease;
                    "
                />
                <img
                    src="src/imgs/edit_mode.svg"
                    id="edit-mode-img"
                    alt="Edit Mode"
                    style="
                        position: fixed;
                        top: 5px;
                        right: -50%;
                        width: 60px;
                        transition: right 0.5s ease;
                    "
                />
            </button>
        </div>

        <div id="notifications" style="position: absolute; top: 80px"></div>
    </body>
</html>
